openapi: 3.0.3
info:
  title: Knowledgebase GPT — Workspace API
  description: |
    Workspace management endpoints (Phase 1 implementation).

    Note: Workspace member/invitation endpoints (Startup tier) are Phase 2
    and not yet implemented.

    Updated to match actual source implementation.
  version: 1.1.0

servers:
  - url: http://localhost:3030/api/v1
    description: Local development
  - url: https://staging.knowledgebase.app/api/v1
    description: Staging

tags:
  - name: Workspace
    description: Workspace management

paths:

  /workspace:
    get:
      tags: [Workspace]
      summary: List workspaces
      description: |
        Returns all workspaces owned by the authenticated account.
        Supports search and pagination.
      operationId: listWorkspaces
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
        - name: search
          in: query
          schema:
            type: string
            maxLength: 100
            default: ''
          description: Filter by workspace name
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Workspace list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkspaceItem'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Workspace]
      summary: Create a workspace
      operationId: createWorkspace
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceRequest'
            examples:
              valid:
                summary: Create workspace
                value:
                  name: My Project
                  color: '#6366f1'
      responses:
        '201':
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceItem'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /workspace/{id}:
    patch:
      tags: [Workspace]
      summary: Update a workspace
      operationId: updateWorkspace
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Workspace ULID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceRequest'
      responses:
        '200':
          description: Workspace updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceItem'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    DeviceId:
      name: x-device-id
      in: header
      required: true
      schema:
        type: string
      description: Client device identifier

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
    Unauthorized:
      description: Missing or invalid auth token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
    Forbidden:
      description: Account does not own this workspace
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
    NotFound:
      description: Workspace not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'

  schemas:
    WorkspaceItem:
      type: object
      properties:
        id:
          type: string
          description: ULID
        name:
          type: string
        logo:
          type: string
          nullable: true
        color:
          type: string
          example: '#18181b'
        accountId:
          type: string
          description: Owner account ULID
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WorkspaceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        logo:
          type: string
          maxLength: 128
          nullable: true
        color:
          type: string
          maxLength: 32
          example: '#18181b'

    Pagination:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }

    ErrorMessage:
      type: object
      properties:
        message:
          type: string
