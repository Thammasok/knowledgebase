openapi: 3.0.3
info:
  title: Knowledgebase GPT — Auth API
  description: |
    Authentication endpoints: registration, email verification, login,
    Google OAuth, token refresh, and logout.

    **Scenarios:** SC-AUTH-001 through SC-AUTH-009
    **Test Cases:** TC-AUTH-001 through TC-AUTH-024
  version: 1.0.0

servers:
  - url: http://localhost:3030/api/v1
    description: Local development
  - url: https://staging.knowledgebase.app/api/v1
    description: Staging

tags:
  - name: Auth
    description: Authentication and account management

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user account
      description: |
        Creates a new user account. Dispatches a verification email.
        New accounts default to the **Free** tier.

        **SC:** SC-AUTH-001, SC-AUTH-002, SC-AUTH-003
        **TC:** TC-AUTH-001 → TC-AUTH-016
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              valid:
                summary: Valid registration
                value:
                  displayName: JohnDoe
                  email: newuser@example.com
                  password: SecurePass1!
              duplicateEmail:
                summary: Already registered email
                value:
                  displayName: AnotherUser
                  email: existing@example.com
                  password: SecurePass1!
              weakPassword:
                summary: Password missing special char
                value:
                  displayName: JohnDoe
                  email: newuser@example.com
                  password: SecurePass1
      responses:
        '201':
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
              example:
                code: VALIDATION_ERROR
                message: One or more fields are invalid.
                errors:
                  - field: password
                    code: PASSWORD_MISSING_SPECIAL
                    message: Password must contain at least one special character.
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: EMAIL_ALREADY_EXISTS
                message: This email address is already registered.
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email address
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: Verification token from email link
      responses:
        '200':
          description: Email verified successfully
        '400':
          description: Token invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: TOKEN_INVALID
                message: Verification token is invalid.
        '410':
          description: Token expired (> 24 hours)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: TOKEN_EXPIRED
                message: Verification token has expired. Please request a new one.

  /auth/resend-verification:
    post:
      tags: [Auth]
      summary: Resend verification email
      description: |
        Rate limited to 3 requests per hour per email address.
        **SC:** SC-AUTH-009 | **TC:** TC-AUTH-024
      operationId: resendVerification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Email resent
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      description: |
        Returns JWT access token (15 min) and refresh token (30 days).
        Rate limited to 10 failed attempts per IP per minute.

        **SC:** SC-AUTH-004, SC-AUTH-005, SC-AUTH-008
        **TC:** TC-AUTH-017, TC-AUTH-018, TC-AUTH-019, TC-AUTH-023
      operationId: loginUser
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              valid:
                value:
                  email: verified@example.com
                  password: SecurePass1!
              wrongPassword:
                value:
                  email: verified@example.com
                  password: WrongPass99!
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: INVALID_CREDENTIALS
                message: invalid email or password
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/oauth/google:
    post:
      tags: [Auth]
      summary: Authenticate with Google OAuth
      description: |
        Creates account on first login (email_verified = true).
        Logs in existing users.
        **SC:** SC-AUTH-006 | **TC:** TC-AUTH-020, TC-AUTH-021
      operationId: googleOAuth
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [idToken]
              properties:
                idToken:
                  type: string
                  description: Google ID token from OAuth callback
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          description: Invalid or expired Google token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: INVALID_TOKEN
                message: Google ID token is invalid or expired.

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: |
        Exchange a valid refresh token for a new access token.
        **SC:** SC-AUTH-007 | **TC:** TC-AUTH-022
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken, deviceId]
              properties:
                refreshToken:
                  type: string
                deviceId:
                  type: string
      responses:
        '200':
          description: New access token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    description: JWT access token (expires in 15 minutes)
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke refresh token
      operationId: logoutUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Logged out successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    DeviceId:
      name: x-device-id
      in: header
      required: true
      schema:
        type: string
      description: Unique identifier for the client device/browser session

  responses:
    Unauthorized:
      description: Missing or invalid access token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: UNAUTHORIZED
            message: Access token is missing or invalid.
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: RATE_LIMITED
            message: Too many requests. Please try again later.

  schemas:
    RegisterRequest:
      type: object
      required: [displayName, email, password]
      properties:
        displayName:
          type: string
          minLength: 2
          maxLength: 50
          pattern: '^[a-zA-Z0-9]+$'
          description: Alphanumeric display name (2–50 chars)
          example: JohnDoe
        email:
          type: string
          format: email
          maxLength: 255
          description: Valid email address (must be unique)
          example: user@example.com
        password:
          type: string
          minLength: 8
          maxLength: 128
          description: |
            Minimum 8 characters.
            Must contain: ≥1 uppercase, ≥1 digit, ≥1 special character (!@#$%^&*()_+).
          example: SecurePass1!

    RegisterResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        tier:
          type: string
          enum: [free]
          description: Always "free" for new registrations

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthTokenResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT access token (expires in 15 minutes)
        refreshToken:
          type: string
          description: Opaque refresh token (expires in 30 days)
        tier:
          type: string
          enum: [free, personal, startup]

    ValidationError:
      type: object
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: One or more fields are invalid.
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: email
              code:
                type: string
                example: INVALID_FORMAT
              message:
                type: string
                example: Email format is invalid.

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
