openapi: 3.0.3
info:
  title: Knowledgebase GPT — Auth API
  description: |
    Authentication endpoints: registration, email OTP verification, login,
    OAuth sign-in, token refresh, logout, and password reset.

    Updated to match actual source implementation (Phase 1).

    **Scenarios:** SC-AUTH-001 through SC-AUTH-009
    **Test Cases:** TC-AUTH-001 through TC-AUTH-024
  version: 1.1.0

servers:
  - url: http://localhost:3030/api/v1
    description: Local development
  - url: https://staging.knowledgebase.app/api/v1
    description: Staging

tags:
  - name: Auth
    description: Authentication and account management
  - name: Account
    description: User profile and settings
  - name: AuthSession
    description: Device session management

paths:

  # ── SIGNUP ──────────────────────────────────────────────────────────────

  /auth/signup:
    post:
      tags: [Auth]
      summary: Register a new account
      description: |
        Creates a new user account with email/password. Account starts unverified.
        User must verify email via OTP flow before full access.

        **SC:** SC-AUTH-001, SC-AUTH-002, SC-AUTH-003
        **TC:** TC-AUTH-001 → TC-AUTH-016
      operationId: signupUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
            examples:
              valid:
                summary: Valid registration
                value:
                  displayName: JohnDoe
                  email: newuser@example.com
                  password: SecurePass1!
              duplicateEmail:
                summary: Already registered email
                value:
                  displayName: AnotherUser
                  email: existing@example.com
                  password: SecurePass1!
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: account created
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  # ── REQUEST ACCESS (WAITLIST) ────────────────────────────────────────────

  /auth/request-access:
    post:
      tags: [Auth]
      summary: Submit email for invite-gated waitlist
      operationId: requestAccess
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 80
      responses:
        '201':
          description: Request submitted
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/signup/request-access:
    post:
      tags: [Auth]
      summary: Register via approved invite
      operationId: signupFromRequestAccess
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [requestId, displayName, password]
              properties:
                requestId:
                  type: string
                displayName:
                  type: string
                  minLength: 3
                  maxLength: 50
                password:
                  type: string
                  minLength: 8
                  maxLength: 32
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: account created
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── LOGIN ────────────────────────────────────────────────────────────────

  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate with email and password
      description: |
        Returns JWT access + refresh tokens and basic account info.
        Creates an AuthSession record for the device.

        **TC:** TC-AUTH-017, TC-AUTH-018, TC-AUTH-019
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              valid:
                summary: Valid credentials
                value:
                  email: user@example.com
                  password: SecurePass1!
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── REFRESH ──────────────────────────────────────────────────────────────

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: |
        Uses the refresh token (in Authorization header) to issue new tokens.
        Requires `x-device-id` header matching the original session.
      operationId: refreshToken
      security:
        - refreshTokenAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: New tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── LOGOUT ───────────────────────────────────────────────────────────────

  /auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate current session
      operationId: logoutUser
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logout success
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── OTP EMAIL VERIFICATION ───────────────────────────────────────────────

  /auth/verify/mail:
    post:
      tags: [Auth]
      summary: Send OTP verification email
      description: |
        Generates a 6-digit OTP, stores it in Redis with TTL, and sends it to the email.
        Returns a `ref` code that must be submitted along with the OTP.
      operationId: sendVerifyOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: OTP sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  mail:
                    type: object
                    properties:
                      message:
                        type: string
                        example: send email is successed
                  ref:
                    type: string
                    description: Reference code to use when verifying OTP
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Auth]
      summary: Verify email with OTP
      description: |
        Validates `{ email, ref, otp }` against Redis. On success, marks account
        as `isVerify: true` and deletes OTP from Redis.
      operationId: verifyEmailOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, ref, otp]
              properties:
                email:
                  type: string
                  format: email
                ref:
                  type: string
                  description: Reference code from send-OTP response
                otp:
                  type: string
                  pattern: '^\d{6}$'
                  description: 6-digit numeric OTP
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: verify account is successed
        '400':
          $ref: '#/components/responses/ValidationError'

  # ── FORGOT / RESET PASSWORD ──────────────────────────────────────────────

  /auth/forgot/mail:
    post:
      tags: [Auth]
      summary: Request password reset email
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Reset email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: send mail for request change password success
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/password:
    post:
      tags: [Auth]
      summary: Set new password via reset token
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                  description: Reset token from email
                password:
                  type: string
                  minLength: 8
                  maxLength: 64
      responses:
        '200':
          description: Password updated
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── OAUTH ────────────────────────────────────────────────────────────────

  /auth/oauth:
    post:
      tags: [Auth]
      summary: Sign in or sign up via OAuth provider
      description: |
        Unified OAuth endpoint for Google, GitHub, and Facebook.
        Creates account if first login; links if email already exists.
        Called by the Next.js NextAuth JWT callback.
      operationId: oauthSignin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  # ── ACCOUNT ──────────────────────────────────────────────────────────────

  /account/:
    get:
      tags: [Account]
      summary: Get account profile
      operationId: getProfile
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Account profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      tags: [Account]
      summary: Update account profile
      operationId: updateProfile
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
                  maxLength: 255
                firstName:
                  type: string
                  maxLength: 255
                lastName:
                  type: string
                  maxLength: 255
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountProfile'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /account/setting/basic:
    get:
      tags: [Account]
      summary: Get account settings
      operationId: getSettings
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Account settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSettings'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      tags: [Account]
      summary: Update account settings
      operationId: updateSettings
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                language:
                  type: string
                  enum: [en, th]
                theme:
                  type: string
                  enum: [light, dark, auto]
      responses:
        '200':
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSettings'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── AUTH SESSIONS ─────────────────────────────────────────────────────────

  /auth-session/:
    get:
      tags: [AuthSession]
      summary: List device sessions
      operationId: listSessions
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 10 }
      responses:
        '200':
          description: Session list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuthSessionItem'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth-session/deactivate/{id}:
    delete:
      tags: [AuthSession]
      summary: Deactivate a session (remote sign-out)
      operationId: deactivateSession
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: deactivate success
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token (short-lived JWT, sub=access_token)
    refreshTokenAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Refresh token (longer-lived JWT, sub=refresh_token)

  parameters:
    DeviceId:
      name: x-device-id
      in: header
      required: true
      schema:
        type: string
      description: Client device identifier (stored in cookie)

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
          example:
            message: validation error description
    Unauthorized:
      description: Missing or invalid auth token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
    Conflict:
      description: Conflict (duplicate resource)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'

  schemas:
    SignupRequest:
      type: object
      required: [displayName, email, password]
      properties:
        displayName:
          type: string
          minLength: 3
          maxLength: 50
          example: JohnDoe
        email:
          type: string
          format: email
          maxLength: 80
          example: user@example.com
        password:
          type: string
          minLength: 8
          maxLength: 32
          description: Must contain uppercase, lowercase, digit, special character
          example: SecurePass1!

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    OAuthRequest:
      type: object
      required: [provider, providerId, email, displayName]
      properties:
        provider:
          type: string
          enum: [google, github, facebook]
        providerId:
          type: string
        email:
          type: string
          format: email
        displayName:
          type: string
        image:
          type: string
          nullable: true

    AuthTokenResponse:
      type: object
      properties:
        token:
          type: object
          properties:
            accessToken:
              type: string
            refreshToken:
              type: string
        account:
          type: object
          properties:
            displayName:
              type: string
            email:
              type: string
              format: email
            image:
              type: string
              nullable: true
            isVerify:
              type: boolean

    AccountProfile:
      type: object
      properties:
        id:
          type: string
          description: ULID
        displayName:
          type: string
        email:
          type: string
          format: email
        image:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        isVerify:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AccountSettings:
      type: object
      properties:
        language:
          type: string
          enum: [en, th]
        theme:
          type: string
          enum: [light, dark, system]
        updatedAt:
          type: string
          format: date-time

    AuthSessionItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        accountId:
          type: string
        deviceId:
          type: string
        ipAddress:
          type: string
        userAgent:
          type: string
        ipInfo:
          type: object
          properties:
            country: { type: string }
            city: { type: string }
            region: { type: string }
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Pagination:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }

    ErrorMessage:
      type: object
      properties:
        message:
          type: string
