version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: kb_qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', 'http://localhost:6333/readyz']
      interval: 30s
      timeout: 10s
      retries: 3

  mongo:
    image: mongo:latest
    container_name: kb_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: knowledge
      MONGO_INITDB_USERNAME: user
      MONGO_INITDB_PASSWORD: pass
    ports:
      - 27017:27017
    volumes:
      - mongo_data:/data/db


volumes:
  qdrant_data:
  mongo_data:
