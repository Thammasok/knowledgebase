version: '3.8'

services:
  db:
    image: postgres:18
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: kb-db
    ports:
      - 5432:5432
    volumes:
      - ./dockers/postgresql/data:/var/lib/postgresql/18/data
    networks:
      - workspace
  qdrant:
    image: qdrant/qdrant:latest
    container_name: kb_qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', 'http://localhost:6333/readyz']
      interval: 30s
      timeout: 10s
      retries: 3
  redis:
    image: redis
    container_name: redis
    restart: always
    ports:
      - 6379:6379
    networks:
      - workspace
  mongo:
    image: mongo:latest
    container_name: kb_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: knowledge
      MONGO_INITDB_USERNAME: user
      MONGO_INITDB_PASSWORD: pass
    ports:
      - 27017:27017
    volumes:
      - mongo_data:/data/db


volumes:
  qdrant_data:
  mongo_data:
